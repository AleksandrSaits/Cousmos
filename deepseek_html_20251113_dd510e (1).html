<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Coffee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; line-height: 1.6; }
        
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1200');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; }
        .hero p { font-size: 1.3rem; margin-bottom: 30px; }
        .btn {
            background: #d4a373;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #c49261; }
        
        .menu { padding: 80px 20px; text-align: center; }
        .menu h2 { font-size: 2.5rem; margin-bottom: 40px; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .menu-item {
            background: #fefae0;
            padding: 30px;
            border-radius: 10px;
        }
        .menu-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .menu-item h3 { margin: 15px 0 10px; }
        .price { color: #d4a373; font-weight: bold; font-size: 1.2rem; }
        
        .contacts { background: #333; color: white; padding: 60px 20px; text-align: center; }
        .contacts h2 { margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div>
            <h1>Fresh Coffee</h1>
            <p>Лучший кофе в городе</p>
            <a href="#" class="btn">Заказать</a>
        </div>
    </section>
    
    <section class="menu">
        <h2>Наше меню</h2>
        <div class="menu-grid">
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=400" alt="Капучино">
                <h3>Капучино</h3>
                <p class="price">250 ₽</p>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772?w=400" alt="Латте">
                <h3>Латте</h3>
                <p class="price">280 ₽</p>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=400" alt="Эспрессо">
                <h3>Эспрессо</h3>
                <p class="price">150 ₽</p>
            </div>
        </div>
    </section>
    
    <section class="contacts">
        <h2>Контакты</h2>
        <p>📍 ул. Ленина, 10 | 📞 +7 (999) 000-00-00</p>
    </section>
</body>
</html>
