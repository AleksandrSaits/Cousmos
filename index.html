<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBuds Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #1a1a2e; }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }
        
        .product-image {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            box-shadow: 0 30px 80px rgba(102,126,234,0.4);
        }
        
        .product-info h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        .price {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2ecc71;
            margin-bottom: 30px;
        }
        .price span {
            font-size: 1rem;
            color: #999;
            text-decoration: line-through;
            margin-left: 10px;
            font-weight: 400;
        }
        
        .features { list-style: none; margin-bottom: 30px; }
        .features li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .features li:before { content: '✓'; color: #2ecc71; font-weight: bold; }
        
        .btn {
            background: #2ecc71;
            color: white;
            padding: 16px 45px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .badges {
            display: flex;
            gap: 20px;
            margin-top: 35px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #666;
        }
        
        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
            .product-image { font-size: 6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="product-image">🎧</div>
        <div class="product-info">
            <h1>AirBuds Pro</h1>
            <p class="subtitle">Премиум беспроводные наушники</p>
            <div class="price">12 990 ₽ <span>15 990 ₽</span></div>
            <ul class="features">
                <li>Шумоподавление (ANC)</li>
                <li>30 часов работы с кейсом</li>
                <li>Bluetooth 5.3</li>
                <li>Влагозащита IPX5</li>
                <li>Быстрая зарядка</li>
            </ul>
            <button class="btn" onclick="alert('✓ В корзине!')">🛒 Купить</button>
            <div class="badges">
                <span>🚚 Бесплатная доставка</span>
                <span>↩️ Возврат 30 дней</span>
                <span>🛡️ Гарантия 2 года</span>
            </div>
        </div>
    </div>
</body>
</html>
