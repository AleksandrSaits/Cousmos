<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVAN PHOTO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
        
        header {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
        }
        header h1 {
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            margin-bottom: 15px;
            font-style: italic;
        }
        header p { color: #888; font-size: 1.1rem; margin-bottom: 30px; }
        .cta-btn {
            border: 2px solid #d4a373;
            color: #d4a373;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
        }
        
        .gallery {
            padding: 60px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            aspect-ratio: 4/3;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            font-weight: 300;
        }
        .gallery-item:nth-child(1) { background: linear-gradient(135deg, #667eea, #764ba2); }
        .gallery-item:nth-child(2) { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .gallery-item:nth-child(3) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .gallery-item:nth-child(4) { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .gallery-item:nth-child(5) { background: linear-gradient(135deg, #fa709a, #fee140); }
        .gallery-item:nth-child(6) { background: linear-gradient(135deg, #30cfd0, #330867); }
        
        .contact-section {
            padding: 80px 20px;
            text-align: center;
            background: #111;
        }
        .contact-btn {
            background: #d4a373;
            color: #0a0a0a;
            padding: 14px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <h1>IVAN PHOTO</h1>
        <p>Портретная • Свадебная • Коммерческая съёмка</p>
        <a href="#gallery" class="cta-btn">Смотреть работы</a>
    </header>
    
    <section id="gallery" class="gallery">
        <div class="gallery-grid">
            <div class="gallery-item">👤</div>
            <div class="gallery-item">💒</div>
            <div class="gallery-item">✨</div>
            <div class="gallery-item">🌆</div>
            <div class="gallery-item">🎨</div>
            <div class="gallery-item">📷</div>
        </div>
    </section>
    
    <section class="contact-section">
        <h2 style="margin-bottom:25px">Готовы к съёмке?</h2>
        <a href="#" class="contact-btn">Связаться со мной</a>
    </section>
</body>
</html>
